<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV to PNG Table</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>CSV → PNG テーブル変換</h1>
      <p class="lead">CSVファイルまたは直接入力したCSVテキストを、設定付きでPNG化します。</p>

      <section class="panel input-panel">
        <h2>1) CSV入力</h2>
        <div class="input-grid">
          <div class="field full">
            <span>入力形式</span>
            <div class="format-controls" role="group" aria-label="入力形式の選択">
              <button id="formatAutoBtn" class="format-btn active" type="button">自動判定</button>
              <button id="formatCsvBtn" class="format-btn" type="button">CSV</button>
              <button id="formatMdBtn" class="format-btn" type="button">Markdown表</button>
            </div>
            <small id="formatHint" class="format-hint">現在: 自動判定</small>
          </div>

          <label class="field">
            <span>CSV / Markdownファイル</span>
            <input id="csvFile" type="file" accept=".csv,.md,.txt,text/csv,text/markdown,text/plain" />
          </label>
          <label class="field full">
            <span>CSV / Markdownテキスト</span>
            <textarea
              id="csvText"
              rows="10"
              placeholder="CSV例:\n項目,値,メモ\nA,100,テスト\n\nMarkdown表例:\n| 項目 | 値 | メモ |\n| --- | ---: | --- |\n| A | 100 | テスト |"
            ></textarea>
          </label>
        </div>
      </section>

      <section class="panel settings-panel">
        <h2>2) 出力設定</h2>
        <div class="settings-grid">
          <label class="field">
            <span>アスペクト比</span>
            <select id="aspectRatio">
              <option value="16:9" selected>16:9 (デフォルト)</option>
              <option value="4:3">4:3</option>
              <option value="1:1">1:1</option>
              <option value="3:2">3:2</option>
              <option value="21:9">21:9</option>
            </select>
          </label>

          <label class="field">
            <span>DPI</span>
            <input id="dpi" type="number" min="72" max="2400" value="1200" />
          </label>

          <label class="field">
            <span>フォント</span>
            <select id="fontFamily">
              <option value="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif" selected>
                Noto Sans JP (デフォルト)
              </option>
              <option value="'Yu Gothic', 'YuGothic', sans-serif">Yu Gothic</option>
              <option value="'Meiryo', sans-serif">Meiryo</option>
              <option value="'Arial', sans-serif">Arial</option>
              <option value="'Times New Roman', serif">Times New Roman</option>
            </select>
          </label>

          <label class="field">
            <span>フォントサイズ</span>
            <select id="fontSize">
              <option value="auto" selected>自動 (デフォルト)</option>
              <option value="12">12px</option>
              <option value="14">14px</option>
              <option value="16">16px</option>
              <option value="18">18px</option>
              <option value="20">20px</option>
              <option value="24">24px</option>
              <option value="28">28px</option>
              <option value="32">32px</option>
              <option value="36">36px</option>
              <option value="40">40px</option>
              <option value="48">48px</option>
              <option value="56">56px</option>
              <option value="64">64px</option>
              <option value="72">72px</option>
              <option value="84">84px</option>
              <option value="96">96px</option>
              <option value="108">108px</option>
              <option value="120">120px</option>
              <option value="132">132px</option>
              <option value="144">144px</option>
              <option value="156">156px</option>
            </select>
          </label>

          <div class="field current-font" aria-live="polite">
            <span>現在のフォントサイズ</span>
            <output id="currentFontSize">-</output>
          </div>

          <label class="field">
            <span>タイトル行/列の揃え</span>
            <select id="headerAlign">
              <option value="center" selected>中央揃え (デフォルト)</option>
              <option value="left">左揃え</option>
              <option value="right">右揃え</option>
            </select>
          </label>

          <label class="field">
            <span>本文セルの揃え</span>
            <select id="bodyAlign">
              <option value="left" selected>左揃え (デフォルト)</option>
              <option value="center">中央揃え</option>
              <option value="right">右揃え</option>
            </select>
          </label>


          <label class="field checkbox">
            <input id="hasHeaderRow" type="checkbox" checked />
            <span>タイトル行あり</span>
          </label>

          <label class="field checkbox">
            <input id="hasHeaderCol" type="checkbox" />
            <span>タイトル列あり</span>
          </label>

          <label class="field">
            <span>表のデザイン</span>
            <select id="tableStyle"></select>
          </label>

          <label class="field">
            <span>色パターン</span>
            <select id="colorTheme"></select>
          </label>
        </div>
      </section>

      <section class="panel actions">
        <button id="renderBtn" type="button">プレビュー更新</button>
        <button id="downloadBtn" type="button">PNGをダウンロード</button>
      </section>

      <section class="panel preview">
        <h2>3) プレビュー</h2>
        <canvas id="previewCanvas" width="1920" height="1080" aria-label="table preview"></canvas>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
